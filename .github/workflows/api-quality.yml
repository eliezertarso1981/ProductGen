name: API Quality

on:
  pull_request:
    paths:
      - 'api/**'
      - 'docs/reference/database/**'
      - 'docs/static/openapi/**'
      - '.github/workflows/api-quality.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'api/**'
      - 'docs/reference/database/**'
      - 'docs/static/openapi/**'
      - '.github/workflows/api-quality.yml'

jobs:
  quality:
    name: Lint, typecheck, test, OpenAPI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Check OpenAPI sync
        run: npm run openapi:check

